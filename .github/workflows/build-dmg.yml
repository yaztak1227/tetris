name: Build DMG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "*.*.*"
      - "test.*"

permissions:
  contents: write

jobs:
  build:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Build release executable
        run: swift build -c release --product TetrisApp

      - name: Build app bundle
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME="Tetris"
          EXECUTABLE_NAME="Tetris"
          PRODUCT_NAME="TetrisApp"
          RESOURCE_BUNDLE_NAME="Tetris_TetrisApp.bundle"
          BUNDLE_ID="dev.yaztakj1227.Tetris"
          VERSION="${GITHUB_REF_NAME#v}"

          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            VERSION="0.0.0-${GITHUB_RUN_NUMBER}"
          fi

          BUILD_DIR=".build/release"
          DIST_DIR="dist"
          APP_PATH="${DIST_DIR}/${APP_NAME}.app"

          rm -rf "${DIST_DIR}"
          mkdir -p \
            "${APP_PATH}/Contents/MacOS" \
            "${APP_PATH}/Contents/Resources"

          cp "${BUILD_DIR}/${PRODUCT_NAME}" "${APP_PATH}/Contents/MacOS/${EXECUTABLE_NAME}"
          cp -R "${BUILD_DIR}/${RESOURCE_BUNDLE_NAME}" "${APP_PATH}/Contents/Resources/${RESOURCE_BUNDLE_NAME}"
          chmod +x "${APP_PATH}/Contents/MacOS/${EXECUTABLE_NAME}"

          cat > "${APP_PATH}/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>${EXECUTABLE_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>${BUNDLE_ID}</string>
            <key>CFBundleName</key>
            <string>${APP_NAME}</string>
            <key>CFBundleDisplayName</key>
            <string>${APP_NAME}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${GITHUB_RUN_NUMBER}</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          echo "APP_PATH=${APP_PATH}" >> "${GITHUB_ENV}"
          echo "DMG_NAME=${APP_NAME}-${VERSION}-macOS.dmg" >> "${GITHUB_ENV}"
          echo "DMG_VOLUME_NAME=${APP_NAME} ${VERSION}" >> "${GITHUB_ENV}"

      - name: Sign macOS app bundle
        shell: bash
        run: |
          set -euo pipefail

          # Match the reference repository: use ad-hoc signing for macOS builds.
          # No Apple certificate, private key, or notarization credential is stored
          # in GitHub Secrets for this workflow.
          codesign --force --deep --sign - "${APP_PATH}"
          codesign --verify --deep --strict --verbose=4 "${APP_PATH}"

      - name: Create DMG
        shell: bash
        run: |
          set -euo pipefail

          DMG_ROOT="dist/dmg-root"
          DMG_PATH="dist/${DMG_NAME}"

          rm -rf "${DMG_ROOT}" "${DMG_PATH}"
          mkdir -p "${DMG_ROOT}"
          cp -R "${APP_PATH}" "${DMG_ROOT}/"
          ln -s /Applications "${DMG_ROOT}/Applications"

          hdiutil create \
            -volname "${DMG_VOLUME_NAME}" \
            -srcfolder "${DMG_ROOT}" \
            -ov \
            -format UDZO \
            "${DMG_PATH}"
          hdiutil verify "${DMG_PATH}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: tetris-macos-dmg
          path: dist/*.dmg
          if-no-files-found: error
          compression-level: 0

      - name: Publish release asset
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.dmg --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.dmg \
              --title "${GITHUB_REF_NAME}" \
              --notes "Automated macOS DMG build for ${GITHUB_REF_NAME}"
          fi
